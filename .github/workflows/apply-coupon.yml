name: 쿠폰 자동 적용

on:
  schedule:
    # 매일 08:17 KST (23:17 UTC 전날)
    - cron: '17 23 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/apply-coupon.js
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
