name: Keep Alive

on:
  schedule:
    # 50일마다 (매월 1일, 20일)
    - cron: '0 0 1,20 * *'

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keep-alive: prevent scheduled workflows from being disabled"
          git push
