name: 오늘 주차기록 정리

on:
  schedule:
    # 매일 19:07 KST (10:07 UTC)
    - cron: '7 10 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/today-cleanup.js
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
