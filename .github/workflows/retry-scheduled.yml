name: 스케줄 스킵 재실행

on:
  schedule:
    - cron: '47 23 * * *'  # 쿠폰 자동 적용 +30m (08:47 KST)
    - cron: '23 7 * * *'   # 입차시간 변경 알림 +10m (16:23 KST)
    - cron: '37 10 * * *'  # 오늘 주차기록 정리 +30m (19:37 KST)
  workflow_dispatch:

permissions:
  actions: write

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Check and retry skipped workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TODAY=$(date -u +%Y-%m-%d)

          check_and_retry() {
            local workflow=$1
            local name=$2

            RUNS=$(gh api "repos/$REPO/actions/workflows/$workflow/runs?created=>=${TODAY}&event=schedule" --jq '.total_count')

            if [ "$RUNS" = "0" ]; then
              echo "$name: 오늘 스케줄 실행 없음 -> 재트리거"
              gh workflow run "$workflow" --repo "$REPO"
            else
              echo "$name: 이미 실행됨 (${RUNS}건) -> 스킵"
            fi
          }

          check_and_retry "apply-coupon.yml" "쿠폰 자동 적용"
          check_and_retry "notify-entry-change.yml" "입차시간 변경 알림"
          check_and_retry "today-cleanup.yml" "오늘 주차기록 정리"
